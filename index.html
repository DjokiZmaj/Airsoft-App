<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Airsoft Leaderboard - Real-Time</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body { margin:0; font-family:Arial,sans-serif; text-align:center; background:#111; color:white; display:flex; flex-direction:column; justify-content:space-between; height:100vh; }
h1{margin-top:10px;}
#timer{font-size:80px;margin-top:5px;}

.scoreboard{flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;}

.team{width:90%; margin:5px 0; padding:20px; border-radius:15px; user-select:none; cursor:default;}
.blue{background:#1e90ff;}
.red{background:#e74c3c;}

.score{font-size:100px;margin:10px 0;}

button{width:90%; font-size:26px; padding:20px; margin:5px auto; border:none; border-radius:10px; cursor:pointer;}

#controls{margin-bottom:10px;}
#adminBtn{
  position:fixed;
  top:10px;
  right:10px;
  width:auto;
  padding:8px 12px;
  font-size:14px;
  background:#333;
  color:white;
  border-radius:8px;
}

.hidden{display:none;}
.adminMode .team{cursor:pointer;}

/* PHONE */
@media(max-width:767px){
  .scoreboard{flex-direction:row; justify-content:space-around;}
  .team{width:45%;}
  #controls{display:flex; flex-direction:column;}
  button{font-size:22px; padding:15px;}
  #timer{font-size:65px;}
}

/* PC */
@media(min-width:768px){
  .scoreboard{flex-direction:row; justify-content:space-around;}
  .team{width:40%;}
}
</style>
</head>

<body>

<h1>Airsoft Match</h1>
<button id="adminBtn" onclick="login()">Admin</button>

<div id="timer">00:00</div>

<div class="scoreboard">
  <div class="team blue" onclick="addScore('blue')">
    <h2>BLUE</h2>
    <div id="blueScore" class="score">0</div>
  </div>

  <div class="team red" onclick="addScore('red')">
    <h2>RED</h2>
    <div id="redScore" class="score">0</div>
  </div>
</div>

<div id="controls" class="hidden">
  <button onclick="startMatch()">Start Match</button>
  <button id="pauseBtn" onclick="togglePause()">Pause</button>
  <button onclick="endMatch()">End Match</button>
  <button onclick="resetScore()">Reset Score</button>
</div>

<audio id="startSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="endSound" src="https://www.soundjay.com/button/beep-10.wav"></audio>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDhLN_SvgF-gDMhBUpO0ZX8hEyGxY-ZKSM",
  authDomain: "airsoft-application.firebaseapp.com",
  databaseURL: "https://airsoft-application-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "airsoft-application",
  storageBucket: "airsoft-application.firebasestorage.app",
  messagingSenderId: "362910192678",
  appId: "1:362910192678:web:216ab346a50527460842e7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isAdmin = false;
let timerInterval = null;

// Jedinstveni ID uređaja za host logiku
const myHostId = Math.random().toString(36).substr(2, 9);

/* LOGIN */
function login(){
  const code = prompt("Enter admin code:");
  if(code==="1234"){
    isAdmin = true;
    document.getElementById("controls").classList.remove("hidden");
    document.getElementById("adminBtn").style.display="none";
    document.body.classList.add("adminMode");
  } else {
    alert("Wrong code");
  }
}

/* SOUND */
function playSound(id){
  const audio = document.getElementById(id);
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

/* UI UPDATE */
function updateUI(data){
  document.getElementById("blueScore").innerText = data.blue || 0;
  document.getElementById("redScore").innerText = data.red || 0;

  let min = Math.floor((data.timeElapsed||0)/60);
  let sec = (data.timeElapsed||0)%60;

  document.getElementById("timer").innerText =
    String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');

  document.getElementById("pauseBtn").innerText =
    data.isPaused ? "Resume" : "Pause";
}

/* SYNC */
function syncDatabase(){
  db.ref('match').on('value', snapshot=>{
    const data = snapshot.val() || {};
    updateUI(data);

    if(timerInterval){
      clearInterval(timerInterval);
      timerInterval = null;
    }

    // Timer radi SAMO na uređaju koji je host
    if(data.isRunning && !data.isPaused && data.host === myHostId){
      timerInterval = setInterval(()=>{
        db.ref('match/timeElapsed').transaction(v => (v || 0) + 1);
      },1000);
    }
  });
}

/* SCORE */
function addScore(team){
  if(!isAdmin) return;
  db.ref('match/'+team).transaction(v => (v || 0) + 1);
}

/* START (ne resetuje score) */
function startMatch(){
  if(!isAdmin) return;

  playSound("startSound");

  db.ref('match').transaction(current=>{
    if(!current){
      // ako ne postoji match
      return {
        blue: 0,
        red: 0,
        timeElapsed: 0,
        isRunning: true,
        isPaused: false,
        host: myHostId
      };
    } else {
      // ako već postoji match, samo start
      return {
        ...current,
        timeElapsed: 0,
        isRunning: true,
        isPaused: false,
        host: current.host || myHostId
      };
    }
  });
}

/* PAUSE */
function togglePause(){
  if(!isAdmin) return;
  db.ref('match/isPaused').transaction(p => !p);
}

/* END */
function endMatch(){
  if(!isAdmin) return;
  db.ref('match').update({
    isRunning: false,
    isPaused: true
  });
  playSound("endSound");
}

/* RESET SCORE */
function resetScore(){
  if(!isAdmin) return;
  db.ref('match').update({
    blue: 0,
    red: 0
  });
}

syncDatabase();
</script>

</body>
</html>
